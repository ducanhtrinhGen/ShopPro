spring.application.name=demo
server.port=${PORT:8080}

server.address=${SERVER_ADDRESS:}
server.tomcat.protocol=org.apache.coyote.http11.Http11Nio2Protocol

spring.datasource.url=jdbc:mysql://shoppro-mysql-shoppro.e.aivencloud.com:15418/shoppro_db?sslMode=REQUIRED&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
app.frontend-url=${FRONTEND_URL:https://shoppro.id.vn,https://www.shoppro.id.vn,http://localhost:5173}
server.servlet.session.cookie.same-site=lax
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
app.jwt.secret=${APP_JWT_SECRET:shoppro-dev-jwt-secret-change-in-production-2026}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:86400}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.folder=${CLOUDINARY_FOLDER:ShopPro/products}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
