spring.application.name=demo
server.port=${PORT:8080}

server.address=${SERVER_ADDRESS:}
server.tomcat.protocol=org.apache.coyote.http11.Http11Nio2Protocol

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/shoppro_db?serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
app.frontend-url=${FRONTEND_URL:https://shoppro.id.vn,https://www.shoppro.id.vn,http://localhost:5173}
# Base URL for password-reset links (single origin, no trailing slash)
app.password-reset.public-app-url=${PASSWORD_RESET_PUBLIC_APP_URL:http://localhost:5173}
server.servlet.session.cookie.same-site=lax

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.folder=${CLOUDINARY_FOLDER:ShopPro/products}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB